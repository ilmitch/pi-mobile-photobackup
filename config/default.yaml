device:
  hostname: backup.local

network:
  ssid: Aethereal-Backup
  static_ip: 192.168.50.1
  interface: wlan0

destination:
  filesystem_uuid: ""
  required_filesystem: ext4
  backup_root: /Backups
  object_store_root: /Backups/.aethereal/objects/sha256
  manifest_path: /Backups/.aethereal/manifest.sqlite3
  safety_margin_percent: 5
  safety_margin_min_bytes: 10000000000

source:
  mount_root: /run/aethereal/source
  supported_filesystems:
    - vfat
    - exfat
  block_device_read_only: true
  read_only_mount: true

backup:
  partial_suffix: .aethereal-partial
  hash_algorithm: sha256
  verification_retries: 2
  single_active_source: true
  strict_source_hashing: true
  io_worker_count: 1
  io_chunk_bytes: 8388608
  destination_cache_evict: true
  direct_io_verify: false
  # FILE-008: only back up these image/video extensions (lowercase, no leading dot). Dotfiles
  # (macOS ._* / .DS_Store) and dot-directories (.Spotlight-V100, .Trashes) are always skipped.
  # Set to an empty list ([]) for a faithful full-card backup that copies every file.
  media_extensions:
    - jpg
    - jpeg
    - jpe
    - jfif
    - heic
    - heif
    - hif        # canon heif (hdr pq) stills
    - png
    - tif
    - tiff
    - bmp
    - webp
    - dng
    - mpo        # 3D stills (fujifilm, nikon)
    - cr2
    - cr3
    - crw
    - nef
    - nrw
    - arw
    - arq        # sony pixel-shift merged raw
    - srf
    - sr2
    - raf
    - orf
    - rw2
    - raw
    - pef
    - x3f
    - 3fr
    - fff
    - iiq
    - rwl
    - srw
    - mrw
    - kdc
    - dcr
    - erf
    - mef
    - gpr
    - crm        # canon cinema raw light (R5C, C-series)
    - nev        # nikon n-raw video (Z8/Z9/Zf)
    - braw       # blackmagic raw
    - r3d        # red cinema
    - ari        # arriraw
    - mov
    - mp4
    - m4v
    - avi
    - mts
    - m2ts
    - ts
    - mxf
    - 3gp
    - 3g2
    - mpg
    - mpeg
    - m2v
    - wmv
    - mkv
    - webm
    - insv
    - insp       # insta360 photo
    - avchd

database:
  appliance_path: /var/lib/aethereal-backup/appliance.db
  destination_wal: true
  destination_synchronous: FULL

logging:
  path: /var/log/aethereal-backup
  retention_days: 30

thermal:
  warning_celsius: 75

time:
  require_trusted_clock: true
  rtc_profile: ds3231
  allow_phone_sync: true
  max_clock_skew_seconds: 300

system_storage:
  critical_free_bytes: 1000000000
