# Linux dev/test environment on the Mac (Debian Bookworm + Python 3.11, matching the Pi).
#
#   docker compose build             # build the image
#   docker compose run --rm test     # run the full suite on real Linux
#   docker compose run --rm dev      # interactive shell
#   docker compose run --rm privileged pytest -q   # for ext4 loopback / mount tests
#
# The repo is bind-mounted so edits on the Mac are picked up without a rebuild. The venv
# lives at /opt/venv inside the image (see UV_PROJECT_ENVIRONMENT), so the host's macOS
# .venv is never used.
services:
  test:
    build: .
    image: aethereal-dev
    volumes:
      - .:/app
    command: ["pytest", "-q"]

  dev:
    image: aethereal-dev
    volumes:
      - .:/app
    command: ["bash"]
    stdin_open: true
    tty: true

  # Privileged variant for tests that create loopback ext4 filesystems and mount them
  # (source read-only enforcement, ext4 finalization crash windows). Use only when needed.
  privileged:
    image: aethereal-dev
    privileged: true
    volumes:
      - .:/app
    command: ["pytest", "-q"]
